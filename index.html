<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Visiting Card | JAIN FOOD PRODUCTS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f7f3ef; /* Outer beige background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Poppins', 'Open Sans', sans-serif; /* Modern font combination */
    }

    .card {
      width: 380px;
      background-color: #fff; /* Main card background is now clean white */
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      height: 120px; /* Increased header height slightly */
      background: linear-gradient(135deg, #a36136, #7d4e2a); /* Your brown-orange header */
      display: flex;
      justify-content: center;
      align-items: center; /* Vertically centers the logo *inside* the header */
      position: relative;
    }

    /* Logo is now contained *within* the header for perfect fitting */
    .logo {
  /* हम साइज़ को थोड़ा छोटा कर सकते हैं ताकि यह हेडर के अंदर फिट लगे, मान लीजिए 110px */
  width: 150px;
  height: auto;
  position: absolute;
  /* हम इसे हेडर के बीच में ही रखेंगे, बस इसे थोड़ा ऊपर खिसकाएंगे ताकि यह Puneet Jain से न टकराए */
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  object-fit: contain;
  /* ✅ बाकी सब साफ़ है */
  border: none;
  border-radius: 0;
  box-shadow: none;
  background-color: transparent;
  padding: 0;
}
    .content {
      padding: 15px; /* Standard internal padding */
      text-align: center;
    }

    h1.name {
      margin: 10px 0 2px;
      font-size: 28px;
      color: #333;
      font-weight: 700;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* Subtle text shadow for pop */
    }

    p.firm-name {
      margin: 2px 0 15px;
      font-size: 18px;
      color: #a36136;
      font-weight: 600;
      text-transform: uppercase;
    }

    p.manufacturer {
      margin: 0;
      font-size: 14px;
      color: #666;
      letter-spacing: 0.5px;
    }

    .contact-details {
      margin-top: 15px;
      background-color: #fcfaf7; /* Very faint internal beige background for section */
      padding: 15px;
      border-radius: 15px;
      text-align: left;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.03); /* Faint inset shadow */
    }

    .contact-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .contact-list li {
      display: flex;
      align-items: flex-start; /* Icon aligns with the first line of text */
      margin-bottom: 15px;
      color: #333;
      font-size: 15px;
    }

    .contact-list i {
      color: #a36136; /* Using firm name color for icons to unify the theme */
      margin-right: 15px;
      width: 25px;
      font-size: 18px;
      margin-top: 3px;
    }

    .contact-list strong {
      margin-right: 10px;
      font-weight: 600;
    }

    .phone-numbers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .phone-numbers a, .website-link, .email-link {
      color: #333;
      text-decoration: none;
    }

    .phone-numbers a:hover, .website-link:hover, .email-link:hover {
      color: #a36136; /* Highlight color on hover */
    }

    .social-icons {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 25px;
    }

    .social-icons a {
      text-decoration: none;
      font-size: 26px;
      transition: all 0.3s; /* Smooth transitions */
    }

    /* Permanent Brand Colors for Social Icons */
    .fa-facebook { color: #1877f2; }
    .fa-instagram { color: #c32aa3; }
    .fa-whatsapp { color: #25d366; }

    .social-icons a:hover {
      opacity: 0.8;
      transform: scale(1.1); /* Subtle grow effect on hover */
    }

    .qr-container {
      margin-top: 15px;
      text-align: center;
    }

    .qr-code {
      width: 90px;
      height: 90px;
      border: 5px solid #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15); /* More prominent QR shadow */
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <img class="logo" src="JAINLOGO.png" alt="Jain since 1985 | JAIN FOOD PRODUCTS Logo">
    </div>

    <div class="content">
      <h1 class="name">Puneet Jain</h1>
      <p class="firm-name">JAIN FOOD PRODUCTS</p>
      <p class="manufacturer">Jain since 1985 | Namkeen Manufacturer</p>

      <div class="contact-details">
        <ul class="contact-list">
          
          <li>
            <i class="fas fa-phone"></i>
            <strong>Mobiles:</strong>
            <div class="phone-numbers">
              <a href="tel:+919927586045">+91 99275 86045</a>
              <a href="tel:+919837409008">+91 98374 09008</a>
            </div>
          </li>

          <li>
            <i class="fas fa-globe"></i>
            <strong>Website:</strong>
            <a href="http://www.jainfoods.in" target="_blank" class="website-link">www.jainfoods.in</a>
          </li>
          
          <li>
            <i class="fas fa-envelope"></i>
            <strong>Email:</strong>
            <a href="mailto:info@jainfoods.in" class="email-link">info@jainfoods.in</a>
          </li>
          
          <li>
            <i class="fas fa-map-marker-alt"></i>
            <strong>Location:</strong> Meerut (UP)
          </li>
        </ul>
      </div>

      <div class="social-icons">
        <a href="https://www.facebook.com/share/187PQNGHir/" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/jainnamkeenofficial?igsh=YTQ3MjhzYWx1cm0w" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/919927586045" target="_blank"><i class="fab fa-whatsapp"></i></a>
      </div>

      <div class="qr-container">
        <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://www.jainfoods.in" alt="QR Code connecting to www.jainfoods.in">
      </div>
    </div>
  </div>

</body>
</html>
