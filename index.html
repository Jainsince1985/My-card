<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Visiting Card | JAIN FOOD PRODUCTS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* CSS Styles for Layout, Colors, and Alignment */
    body {
      margin: 0;
      padding: 0;
      background-color: #f7f3ef; /* Light beige for background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Open Sans', sans-serif;
    }

    .card {
      width: 380px;
      background-color: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Professional Brown-Orange Header */
    .header {
      height: 140px;
      background: linear-gradient(135deg, #a36136, #7d4e2a); /* Richer brown-orange color */
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 20px;
    }

    /* Logo - Well-aligned in the center */
    .logo {
      width: 130px;
      height: 130px;
      position: absolute;
      top: 50px; /* Vertically centered relative to header */
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid #fff;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .content {
      padding: 60px 30px 20px; /* Space for the overlapping logo */
      text-align: center;
    }

    h1.name {
      margin: 0;
      font-size: 26px;
      color: #333;
      font-weight: 700;
    }

    p.firm-name {
      margin: 2px 0 15px;
      font-size: 16px;
      color: #a36136;
      font-weight: 600;
      text-transform: uppercase;
    }

    p.manufacturer {
      margin: 0;
      font-size: 14px;
      color: #666;
    }

    /* Contact Details Section */
    .contact-details {
      margin-top: 30px;
      background-color: #f5f5f0; /* Soft grey background for contact section */
      padding: 20px;
      border-radius: 15px;
      text-align: left;
    }

    .contact-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .contact-list li {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      color: #333;
      font-size: 14px;
    }

    /* Phone number icons in warm color */
    .contact-list i {
      color: #cc6600; /* Warm orange color for contact icons */
      margin-right: 12px;
      width: 20px;
    }

    .contact-list strong {
      margin-right: 5px;
    }

    /* Phone Numbers - One Line */
    .phone-numbers {
      display: flex;
      gap: 15px; /* Spacing between the numbers */
    }

    /* Social Icons Section (Colorful) */
    .social-icons {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social-icons a {
      text-decoration: none;
      font-size: 24px;
      transition: color 0.3s;
    }

    /* Facebook Brand Color: Blue */
    .fa-facebook { color: #1877f2; }
    /* Instagram Brand Color: Pinkish-red */
    .fa-instagram { color: #c32aa3; }
    /* WhatsApp Brand Color: Green */
    .fa-whatsapp { color: #25d366; }

    .social-icons a:hover {
      opacity: 0.8;
    }

    /* QR Code Section - Well framed */
    .qr-container {
      margin-top: 30px;
      text-align: center;
    }

    .qr-code {
      width: 140px;
      height: 140px;
      border: 4px solid #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
    <img class="logo" src="JAINLOGO.jpg" style="background-color: #fff; object-fit: contain; padding: 12px; box-sizing: border-box;" alt="JAIN FOOD PRODUCTS">
    </div>

    <div class="content">
      <h1 class="name">Puneet Jain</h1>
      <p class="firm-name">JAIN FOOD PRODUCTS</p>
      <p class="manufacturer">Jain since 1985 | Namkeen Manufacturer</p>

      <div class="contact-details">
        <ul class="contact-list">
         <li style="align-items: flex-start;">
            <i class="fas fa-phone" style="margin-top: 5px; color: #cc6600; margin-right: 12px;"></i>
            <strong style="margin-right: 10px;">Mobiles:</strong>
            <div style="display: block;">
              <a href="tel:+919927586045" style="color: #333; text-decoration: none; display: block; margin-bottom: 6px;">+91 99275 86045</a>
              <a href="tel:+919837409008" style="color: #333; text-decoration: none; display: block;">+91 98374 09008</a>
            </div>
          </li>
          <li><i class="fas fa-globe"></i> <strong>Website:</strong> www.jainfoods.in</li>
          <li><i class="fas fa-envelope"></i> <strong>Email:</strong> info@jainfoods.in</li>
          <li><i class="fas fa-map-marker-alt"></i> <strong>Location:</strong> Meerut, UP</li>
        </ul>
      </div>

      <div class="social-icons">
        <a href="https://www.facebook.com/share/187PQNGHir/" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/jainnamkeenofficial?igsh=YTQ3MjhzYWx1cm0w" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/919927586045" target="_blank"><i class="fab fa-whatsapp"></i></a>
      </div>

      <div class="qr-container">
        <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://www.jainfoods.in" alt="QR Code to www.jainfoods.in">
      </div>
    </div>
  </div>

</body>
</html>
